<VirtualHost *:80>
    ServerName web.fis.epn.ec

    Redirect permanent / https://web.fis.epn.ec/
</VirtualHost>

<VirtualHost *:443>
    ServerName web.fis.epn.ec
    ServerAdmin webmaster@fis.epn.ec

    SSLEngine on
    SSLCertificateFile /etc/apache2/tls/web.crt
    SSLCertificateKeyFile /etc/apache2/tls/web.key
    SSLProtocol -all +TLSv1.2 +TLSv1.3

    Header always set Strict-Transport-Security "max-age=31536000"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer"
    Header always set Cache-Control "no-store"
    Header always set Content-Security-Policy "default-src 'self'; style-src 'unsafe-inline'; base-uri 'none'; frame-ancestors 'none'"

    ScriptAlias /fis-idm /usr/lib/cgi-bin/fis-idm.py

    RedirectMatch 302 ^/$ /fis-idm

    <Directory "/usr/lib/cgi-bin">
        Options +ExecCGI -Indexes
        Require all granted
    </Directory>

    <Location "/fis-idm">
        AuthType GSSAPI
        AuthName "Portal de identidad FIS"

        GssapiCredStore keytab:/etc/apache2/krb5/http-web.keytab
        GssapiSSLonly On
        GssapiBasicAuth Off
        GssapiLocalName Off

        Require valid-user
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/fis-idm-error.log
    CustomLog ${APACHE_LOG_DIR}/fis-idm-access.log combined

    LogLevel warn auth_gssapi:info
</VirtualHost>
