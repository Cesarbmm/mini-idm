[libdefaults]
    default_realm = FIS.EPN.EC

    dns_lookup_realm = false
    dns_lookup_kdc = false
    rdns = false
    dns_canonicalize_hostname = false

    ticket_lifetime = 10h
    renew_lifetime = 7d
    forwardable = true
    proxiable = false

[realms]
    FIS.EPN.EC = {
        kdc = kdc1.fis.epn.ec
        kdc = kdc2.fis.epn.ec
        admin_server = kdc1.fis.epn.ec
        kpasswd_server = kdc1.fis.epn.ec
    }

[domain_realm]
    .fis.epn.ec = FIS.EPN.EC
    fis.epn.ec = FIS.EPN.EC
