global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    site: fis-lab
    environment: laboratorio

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: node
    static_configs:
      - targets:
          - 192.168.56.11:9100
        labels:
          host: idm1
          role: ldap-provider-kdc-primary

      - targets:
          - 192.168.56.12:9100
        labels:
          host: idm2
          role: ldap-consumer-kdc-secondary

      - targets:
          - 127.0.0.1:9100
        labels:
          host: edge
          role: proxy-web-monitoring

      - targets:
          - 192.168.56.30:9100
        labels:
          host: client
          role: workstation

  - job_name: haproxy
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8404

  - job_name: apache
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9117

  - job_name: blackbox-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9115

  - job_name: blackbox-ldaps
    metrics_path: /probe

    params:
      module:
        - ldaps_fis

    static_configs:
      - targets:
          - ldap.fis.epn.edu.ec:636
          - ldap1.fis.epn.ec:636
          - ldap2.fis.epn.ec:636

    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target

      - source_labels:
          - __param_target
        target_label: instance

      - target_label: __address__
        replacement: 127.0.0.1:9115

  - job_name: blackbox-kdc
    metrics_path: /probe

    params:
      module:
        - tcp_connect

    static_configs:
      - targets:
          - kdc1.fis.epn.ec:88
          - kdc2.fis.epn.ec:88

    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target

      - source_labels:
          - __param_target
        target_label: instance

      - target_label: __address__
        replacement: 127.0.0.1:9115

  - job_name: blackbox-web
    metrics_path: /probe

    params:
      module:
        - https_kerberos_challenge

    static_configs:
      - targets:
          - https://web.fis.epn.ec/fis-idm

    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target

      - source_labels:
          - __param_target
        target_label: instance

      - target_label: __address__
        replacement: 127.0.0.1:9115
