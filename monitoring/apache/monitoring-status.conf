Listen 127.0.0.1:8080

ExtendedStatus On

<VirtualHost 127.0.0.1:8080>
    ServerName localhost

    <Location "/server-status">
        SetHandler server-status
        Require local
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/monitoring-status-error.log
    CustomLog ${APACHE_LOG_DIR}/monitoring-status-access.log combined
</VirtualHost>
