global
    log /dev/log local0
    log /dev/log local1 notice

    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

    user haproxy
    group haproxy
    daemon

    ssl-server-verify required

defaults
    log global
    mode tcp

    option tcplog
    option dontlognull
    option redispatch

    retries 2

    timeout connect 3s
    timeout client  1m
    timeout server  1m
    timeout check   5s

frontend fe_ldaps
    bind 192.168.56.20:636
    mode tcp
    default_backend be_ldaps

backend be_ldaps
    mode tcp

    option ldap-check
    option log-health-checks

    default-server inter 1s fastinter 500ms downinter 2s fall 2 rise 2

    server ldap1 192.168.56.11:636 check check-ssl verify required ca-file /etc/haproxy/certs/fis-root-ca.crt verifyhost ldap.fis.epn.edu.ec


    server ldap2 192.168.56.12:636 check check-ssl verify required ca-file /etc/haproxy/certs/fis-root-ca.crt verifyhost ldap.fis.epn.edu.ec backup

frontend prometheus_metrics
    bind 127.0.0.1:8404
    mode http

    http-request use-service prometheus-exporter if { path /metrics }

    no log
